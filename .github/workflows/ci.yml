name: Test + Release gastrodon/psyduck

on:
  push:
    branches:
      - '*'
    tags:
      - 'v*'

jobs:
  test:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Go
      # setup-go@v2 ignores go-version-file ("Unexpected input") and installs
      # its own "stable"; the GOTOOLCHAIN switch to go.mod's Go then breaks
      # `go test -cover` on no-test packages with `go: no such tool "covdata"`.
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Run tests
      run: go test ./... -v -race -count 1 -cover -coverprofile=coverage.out -timeout 10m

    - name: Upload coverage to Codecov
      uses: codecov/codecov-action@v4
      with:
        token: ${{ secrets.CODECOV_TOKEN }}
        slug: gastrodon/psyduck

  test-flake:
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Install Nix
      uses: cachix/install-nix-action@v27

    - name: Build flake
      run: nix build . -L

  release-docker:
    if: github.ref == 'refs/heads/main' || startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-flake]
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Docker Buildx
      uses: docker/setup-buildx-action@v1

    - name: Login to Docker Hub
      run: echo "${{ secrets.DOCKERHUB_TOKEN }}" | docker login -u gastrodon --password-stdin docker.io

    - name: Build and Push Docker image
      run: |
        docker build . -t gastrodon/psyduck:latest
        docker tag gastrodon/psyduck:latest gastrodon/psyduck:${{github.ref_name}}
        docker push gastrodon/psyduck:latest
        docker push gastrodon/psyduck:${{github.ref_name}}

  release-binary:
    if: startsWith(github.ref, 'refs/tags/v')
    needs: [test, test-flake]
    runs-on: ubuntu-latest

    steps:
    - name: Check out code
      uses: actions/checkout@v2

    - name: Set up Go
      uses: actions/setup-go@v5
      with:
        go-version-file: go.mod

    - name: Build binary
      # Matches the flake and Dockerfile: pure-Go static build, stripped,
      # no builder-local paths baked in.
      run: CGO_ENABLED=0 go build -trimpath -ldflags="-s -w" -o psyduck .

    - name: Create release
      id: create_release
      uses: softprops/action-gh-release@v1
      with:
        files: psyduck
        repository: gastrodon/psyduck
        tag_name: ${{ github.ref_name }}
        name: Psyduck ${{ github.ref_name }}

